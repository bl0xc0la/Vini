<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vini</title>
  
  <!-- Tailwind CSS Engine CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React 18 Production Engines -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel Compiler to parse JSX directly in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#08090c] text-slate-100 font-sans m-0 p-0 selection:bg-cyan-500 selection:text-black">

  <!-- React Mount Root -->
  <div id="root"></div>

  <!-- React Application Logic -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    const INITIAL_RELEASES = [
      {
        id: 'release-1',
        title: 'Neon Horizon',
        artist: 'VaporPulse',
        genre: 'Electronic / Synthwave',
        status: 'Pending',
        duration: '3:42',
        date: '2026-05-20',
        notes: ''
      },
      {
        id: 'release-2',
        title: 'Glitch Architecture',
        artist: 'Cola',
        genre: 'IDM / Glitch',
        status: 'Approved',
        duration: '4:15',
        date: '2026-05-22',
        notes: 'Metadata fully validated. Sent to DDEX pipeline.'
      },
      {
        id: 'release-3',
        title: 'Terminal Velocity',
        artist: 'BitCrush',
        genre: 'Cyberpunk Ost',
        status: 'Rejected',
        duration: '2:58',
        date: '2026-05-19',
        notes: 'Album artwork text does not match track metadata titles.'
      }
    ];

    function MusicDistroDashboard() {
      const [releases, setReleases] = useState(INITIAL_RELEASES);
      const [currentView, setCurrentView] = useState('artist');
      
      const [formTitle, setFormTitle] = useState('');
      const [formArtist, setFormArtist] = useState('');
      const [formGenre, setFormGenre] = useState('Electronic / Synthwave');
      const [simulatedFile, setSimulatedFile] = useState(null);

      const [selectedTrackId, setSelectedTrackId] = useState(null);
      const [rejectionReason, setRejectionReason] = useState('');
      
      const [isPlaying, setIsPlaying] = useState(false);
      const [playbackProgress, setPlaybackProgress] = useState(35);

      const selectedTrack = releases.find(t => t.id === selectedTrackId);

      useEffect(() => {
        let interval;
        if (isPlaying) {
          interval = setInterval(() => {
            setPlaybackProgress((prev) => (prev >= 100 ? 0 : prev + 1));
          }, 400);
        }
        return () => clearInterval(interval);
      }, [isPlaying]);

      const handleArtistSubmit = (e) => {
        e.preventDefault();
        if (!formTitle || !formArtist) return;

        const newRelease = {
          id: `release-${Date.now()}`,
          title: formTitle,
          artist: formArtist,
          genre: formGenre,
          status: 'Pending',
          duration: '3:30',
          date: new Date().toISOString().split('T')[0],
          notes: ''
        };

        setReleases([newRelease, ...releases]);
        setFormTitle('');
        setFormArtist('');
        setSimulatedFile(null);
      };

      const handleApprove = (trackId) => {
        setReleases(releases.map(track => {
          if (track.id === trackId) {
            return { ...track, status: 'Approved', notes: 'Manually verified and approved via system supervisor.' };
          }
          return track;
        }));
        setIsPlaying(false);
      };

      const handleReject = (trackId) => {
        if (!rejectionReason.trim()) return;
        setReleases(releases.map(track => {
          if (track.id === trackId) {
            return { ...track, status: 'Rejected', notes: rejectionReason };
          }
          return track;
        }));
        setRejectionReason('');
        setIsPlaying(false);
      };

      const pendingCount = releases.filter(t => t.status === 'Pending').length;
      const approvedCount = releases.filter(t => t.status === 'Approved').length;
      const rejectedCount = releases.filter(t => t.status === 'Rejected').length;

      return (
        <div className="min-h-screen p-6">
          <header className="max-w-7xl mx-auto mb-8 flex flex-col sm:flex-row justify-between items-center p-4 bg-slate-900/40 backdrop-blur-md border border-white/5 rounded-xl shadow-xl">
            <div>
              <h1 className="text-xl font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-400 font-mono">
                Vini
              </h1>
              <p className="text-xs text-slate-400 tracking-tight">Core Audio Distribution System</p>
            </div>
            
            <div className="flex bg-black/40 p-1 rounded-lg border border-white/5 mt-4 sm:mt-0">
              <button 
                onClick={() => setCurrentView('artist')}
                className={`px-5 py-2 text-xs font-medium tracking-wide rounded-md transition-all duration-200 ${currentView === 'artist' ? 'bg-gradient-to-r from-cyan-500/20 to-blue-500/20 text-cyan-400 border border-cyan-500/30 shadow-[0_0_10px_rgba(6,182,212,0.15)]' : 'text-slate-400 hover:text-slate-200'}`}
              >
                ARTIST GATEWAY
              </button>
              <button 
                onClick={() => {
                  setCurrentView('admin');
                  const firstPending = releases.find(t => t.status === 'Pending');
                  if (firstPending) setSelectedTrackId(firstPending.id);
                }}
                className={`px-5 py-2 text-xs font-medium tracking-wide rounded-md transition-all duration-200 ${currentView === 'admin' ? 'bg-gradient-to-r from-purple-500/20 to-pink-500/20 text-purple-400 border border-purple-500/30 shadow-[0_0_10px_rgba(168,85,247,0.15)]' : 'text-slate-400 hover:text-slate-200'}`}
              >
                ADMIN PANEL
              </button>
            </div>
          </header>

          <main className="max-w-7xl mx-auto">
            {currentView === 'artist' ? (
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div className="lg:col-span-1 bg-slate-900/40 backdrop-blur-md border border-white/5 p-6 rounded-2xl shadow-2xl">
                  <h2 className="text-sm font-semibold tracking-wider text-slate-300 uppercase mb-6 pb-2 border-b border-white/5">
                    Submit New Release
                  </h2>
                  <form onSubmit={handleArtistSubmit} className="space-y-5">
                    <div>
                      <label className="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-2">Track Title</label>
                      <input 
                        type="text" 
                        value={formTitle}
                        onChange={(e) => setFormTitle(e.target.value)}
                        placeholder="Enter absolute song name"
                        className="w-full bg-black/40 border border-white/10 rounded-lg px-4 py-3 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-cyan-500/50 transition-all"
                      />
                    </div>
                    <div>
                      <label className="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-2">Primary Artist</label>
                      <input 
                        type="text" 
                        value={formArtist}
                        onChange={(e) => setFormArtist(e.target.value)}
                        placeholder="Individual or group name"
                        className="w-full bg-black/40 border border-white/10 rounded-lg px-4 py-3 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-cyan-500/50 transition-all"
                      />
                    </div>
                    <div>
                      <label className="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-2">Primary Genre</label>
                      <select 
                        value={formGenre}
                        onChange={(e) => setFormGenre(e.target.value)}
                        className="w-full bg-black/40 border border-white/10 rounded-lg px-4 py-3 text-sm text-slate-200 focus:outline-none focus:border-cyan-500/50"
                      >
                        <option value="Electronic / Synthwave">Electronic / Synthwave</option>
                        <option value="IDM / Glitch">IDM / Glitch</option>
                        <option value="Ambient / Drone">Ambient / Drone</option>
                        <option value="Industrial / Techno">Industrial / Techno</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-2">Audio Asset</label>
                      <div 
                        onClick={() => setSimulatedFile('master_lossless.wav')}
                        className={`border-2 border-dashed rounded-lg p-6 text-center cursor-pointer transition-all ${simulatedFile ? 'border-cyan-500/40 bg-cyan-500/5' : 'border-white/10 bg-black/20 hover:border-white/20'}`}
                      >
                        <div className="text-xs text-slate-400">
                          {simulatedFile ? (
                            <span className="text-cyan-400 font-mono">READY: {simulatedFile}</span>
                          ) : (
                            <span>Click to attach master file (WAV / FLAC)</span>
                          )}
                        </div>
                      </div>
                    </div>
                    <button 
                      type="submit" 
                      disabled={!formTitle || !formArtist || !simulatedFile}
                      className="w-full mt-2 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 disabled:from-slate-800 disabled:to-slate-800 disabled:text-slate-500 text-black font-bold text-xs tracking-widest py-3 px-4 rounded-lg uppercase transition-all"
                    >
                      Dispatch to Review Queue
                    </button>
                  </form>
                </div>

                <div className="lg:col-span-2 bg-slate-900/40 backdrop-blur-md border border-white/5 p-6 rounded-2xl shadow-2xl">
                  <h2 className="text-sm font-semibold tracking-wider text-slate-300 uppercase mb-6 pb-2 border-b border-white/5">
                    Active Catalog Cataloging
                  </h2>
                  <div className="overflow-x-auto">
                    <table className="w-full text-left border-collapse">
                      <thead>
                        <tr className="border-b border-white/5 text-[10px] uppercase tracking-widest text-slate-500">
                          <th className="pb-3 font-semibold">Track Information</th>
                          <th className="pb-3 font-semibold">Genre</th>
                          <th className="pb-3 font-semibold">Status</th>
                          <th className="pb-3 font-semibold text-right">System Feedback</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-white/5 text-sm">
                        {releases.map((track) => (
                          <tr key={track.id} className="group hover:bg-white/[0.01]">
                            <td className="py-4 pr-3">
                              <div className="font-medium text-slate-200 group-hover:text-cyan-400 transition-colors">{track.title}</div>
                              <div className="text-xs text-slate-400 mt-0.5">{track.artist}</div>
                            </td>
                            <td className="py-4 text-xs font-mono text-slate-400">{track.genre}</td>
                            <td className="py-4">
                              <span className={`inline-block px-2 py-1 text-[10px] font-bold tracking-wider rounded uppercase border ${
                                track.status === 'Approved' ? 'bg-emerald-500/10 border-emerald-500/30 text-emerald-400' :
                                track.status === 'Rejected' ? 'bg-rose-500/10 border-rose-500/30 text-rose-400' :
                                'bg-amber-500/10 border-amber-500/30 text-amber-400'
                              }`}>
                                {track.status}
                              </span>
                            </td>
                            <td className="py-4 text-xs text-slate-400 text-right max-w-xs truncate">
                              {track.notes || <span className="text-slate-600 italic">No notes linked</span>}
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            ) : (
              <div className="space-y-6">
                <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                  <div className="bg-slate-900/40 border border-white/5 p-4 rounded-xl flex justify-between items-center">
                    <div>
                      <div className="text-[10px] uppercase tracking-wider text-slate-500">Awaiting Ingestion</div>
                      <div className="text-xl font-bold font-mono text-amber-400 mt-1">{pendingCount}</div>
                    </div>
                    <div className="w-2 h-2 rounded-full bg-amber-400 animate-pulse" />
                  </div>
                  <div className="bg-slate-900/40 border border-white/5 p-4 rounded-xl flex justify-between items-center">
                    <div>
                      <div className="text-[10px] uppercase tracking-wider text-slate-500">Authorized Releases</div>
                      <div className="text-xl font-bold font-mono text-emerald-400 mt-1">{approvedCount}</div>
                    </div>
                    <div className="w-2 h-2 rounded-full bg-emerald-400" />
                  </div>
                  <div className="bg-slate-900/40 border border-white/5 p-4 rounded-xl flex justify-between items-center">
                    <div>
                      <div className="text-[10px] uppercase tracking-wider text-slate-500">System Rejections</div>
                      <div className="text-xl font-bold font-mono text-rose-400 mt-1">{rejectedCount}</div>
                    </div>
                    <div className="w-2 h-2 rounded-full bg-rose-400" />
                  </div>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                  <div className="lg:col-span-1 bg-slate-900/40 border border-white/5 p-4 rounded-2xl h-[500px] flex flex-col">
                    <h3 className="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-3 px-2">Review Backlog Queue</h3>
                    <div className="space-y-2 overflow-y-auto flex-1 pr-1">
                      {releases.filter(t => t.status === 'Pending').length === 0 ? (
                        <div className="text-xs text-slate-600 italic p-4 text-center border border-dashed border-white/5 rounded-lg mt-4">
                          All pipelines completely cleared.
                        </div>
                      ) : (
                        releases.filter(t => t.status === 'Pending').map((track) => (
                          <div 
                            key={track.id}
                            onClick={() => {
                              setSelectedTrackId(track.id);
                              setIsPlaying(false);
                              setPlaybackProgress(20);
                            }}
                            className={`p-3 rounded-lg border cursor-pointer transition-all ${selectedTrackId === track.id ? 'bg-purple-500/10 border-purple-500/40' : 'bg-black/20 border-white/5 hover:bg-black/40'}`}
                          >
                            <div className="text-xs font-medium text-slate-200 truncate">{track.title}</div>
                            <div className="text-[11px] text-slate-400 truncate mt-0.5">{track.artist}</div>
                            <div className="flex justify-between items-center mt-2 pt-2 border-t border-white/5 text-[10px] font-mono text-slate-500">
                              <span>{track.genre.split(' / ')[0]}</span>
                              <span>{track.date}</span>
                            </div>
                          </div>
                        ))
                      )}
                    </div>
                  </div>

                  <div className="lg:col-span-2 bg-slate-900/40 border border-white/5 p-6 rounded-2xl flex flex-col justify-between min-h-[500px]">
                    {selectedTrack && selectedTrack.status === 'Pending' ? (
                      <>
                        <div>
                          <div className="flex justify-between items-start mb-6">
                            <div>
                              <span className="text-[10px] font-mono text-purple-400 bg-purple-950/50 px-2 py-0.5 rounded border border-purple-900/40 uppercase tracking-widest">
                                Inspection Object Active
                              </span>
                              <h2 className="text-xl font-bold tracking-tight text-slate-100 mt-2">{selectedTrack.title}</h2>
                              <p className="text-sm text-slate-400 mt-0.5">Uploaded by: {selectedTrack.artist}</p>
                            </div>
                            <div className="text-right font-mono text-xs text-slate-500">
                              <div>ID: {selectedTrack.id}</div>
                              <div className="mt-1">Format: 24bit / 44.1kHz</div>
                            </div>
                          </div>

                          <div className="grid grid-cols-2 gap-3 mb-6 bg-black/30 p-4 rounded-xl border border-white/5">
                            <div className="text-xs flex items-center space-x-2 text-slate-300">
                              <span className="w-1.5 h-1.5 bg-cyan-400 rounded-full" />
                              <span>DDEX Compliance Check Complete</span>
                            </div>
                            <div className="text-xs flex items-center space-x-2 text-slate-300">
                              <span className="w-1.5 h-1.5 bg-cyan-400 rounded-full" />
                              <span>Audio Fingerprint Matches Cleared</span>
                            </div>
                            <div className="text-xs flex items-center space-x-2 text-slate-300">
                              <span className="w-1.5 h-1.5 bg-cyan-400 rounded-full" />
                              <span>Cover Art Geometry Unlocked</span>
                            </div>
                            <div className="text-xs flex items-center space-x-2 text-slate-300">
                              <span className="w-1.5 h-1.5 bg-cyan-400 rounded-full" />
                              <span>Explicit Lyric Filter Applied</span>
                            </div>
                          </div>

                          <div className="bg-black/50 border border-white/5 p-4 rounded-xl mb-6">
                            <div className="flex items-center space-x-4 mb-3">
                              <button 
                                onClick={() => setIsPlaying(!isPlaying)}
                                className="bg-slate-100 hover:bg-white text-black text-[10px] font-bold px-4 py-2 rounded uppercase tracking-wider"
                              >
                                {isPlaying ? 'PAUSE' : 'PLAY MASTER'}
                              </button>
                              <div className="flex-1">
                                <div className="text-xs font-mono text-slate-300 truncate">{selectedTrack.title} - Preview stream</div>
                                <div className="text-[10px] text-slate-500 font-mono mt-0.5">Stream Quality Node: 128kbps Encrypted AAC</div>
                              </div>
                            </div>
                            <div className="relative w-full h-8 bg-slate-950 rounded overflow-hidden flex items-end px-2 space-x-0.5">
                              {[30, 45, 20, 60, 80, 50, 40, 75, 90, 65, 30, 45, 60, 85, 40, 55, 70, 95, 30, 20, 50, 75, 60, 40, 30, 65, 80, 45, 90, 35, 50, 65, 40].map((height, idx) => {
                                const stepWidth = 100 / 33;
                                const isPlayed = playbackProgress >= (idx * stepWidth);
                                return (
                                  <div 
                                    key={idx} 
                                    style={{ height: `${height}%` }} 
                                    className={`flex-1 transition-colors duration-200 ${isPlayed ? 'bg-purple-500' : 'bg-slate-800'}`}
                                  />
                                );
                              })}
                            </div>
                          </div>
                        </div>

                        <div className="border-t border-white/5 pt-4 space-y-4">
                          <button
                            onClick={() => handleApprove(selectedTrack.id)}
                            className="w-full bg-gradient-to-r from-emerald-500 to-teal-600 text-black text-xs font-bold tracking-widest py-3 px-4 rounded-lg uppercase hover:from-emerald-400 hover:to-teal-500 transition-all"
                          >
                            Approve and Commit to DSP Pipes
                          </button>
                          <div className="bg-black/30 p-3 rounded-lg border border-white/5 flex gap-2">
                            <input 
                              type="text"
                              value={rejectionReason}
                              onChange={(e) => setRejectionReason(e.target.value)}
                              placeholder="Type explicit rejection reason code..."
                              className="flex-1 bg-black/40 border border-white/10 rounded-md px-3 py-2 text-xs text-slate-200 focus:outline-none focus:border-rose-500/50"
                            />
                            <button
                              onClick={() => handleReject(selectedTrack.id)}
                              disabled={!rejectionReason.trim()}
                              className="bg-rose-500/20 hover:bg-rose-500/30 border border-rose-500/40 text-rose-400 disabled:opacity-30 text-[10px] font-bold tracking-wider px-4 rounded-md uppercase"
                            >
                              Execute Reject
                            </button>
                          </div>
                        </div>
                      </>
                    ) : (
                      <div className="m-auto text-center py-12">
                        <div className="text-slate-600 font-mono text-xs">NO ASSET SELECTED FOR ACTIVE REVIEWS</div>
                        <p className="text-xs text-slate-500 max-w-xs mt-2 mx-auto">
                          Select an incoming pending release object from the queue to configure execution paths.
                        </p>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MusicDistroDashboard />);
  </script>
</body>
</html>
