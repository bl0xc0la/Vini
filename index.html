<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VINI Core System</title>
  
  <!-- Tailwind CSS Engine CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React 18 Production Engines -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel Compiler to parse JSX directly in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#0a0b0d] text-slate-200 font-sans m-0 p-0 selection:bg-cyan-500 selection:text-black">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Relative endpoint targeting because of single server execution architecture
    const API_BASE_URL = '/api';

    function ViniDashboard() {
      const [releases, setReleases] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [errorMessage, setErrorMessage] = useState(null);
      const [currentView, setCurrentView] = useState('artist');
      
      // Form fields state
      const [formTitle, setFormTitle] = useState('');
      const [formArtist, setFormArtist] = useState('');
      const [formGenre, setFormGenre] = useState('Electronic / Synthwave');
      const [attachedAsset, setAttachedAsset] = useState(null);

      // Admin focus processing states
      const [selectedTrackId, setSelectedTrackId] = useState(null);
      const [rejectionReason, setRejectionReason] = useState('');
      const [isPlaying, setIsPlaying] = useState(false);
      const [playbackProgress, setPlaybackProgress] = useState(0);

      const selectedTrack = releases.find(t => t.id === selectedTrackId);

      useEffect(() => {
        loadCatalogData();
      }, []);

      useEffect(() => {
        let interval;
        if (isPlaying) {
          interval = setInterval(() => {
            setPlaybackProgress((prev) => (prev >= 100 ? 0 : prev + 2));
          }, 300);
        }
        return () => clearInterval(interval);
      }, [isPlaying]);

      const loadCatalogData = async () => {
        setIsLoading(true);
        setErrorMessage(null);
        try {
          const response = await fetch(`${API_BASE_URL}/releases`);
          if (!response.ok) throw new Error('Database indexing failure.');
          const data = await response.json();
          setReleases(data);
        } catch (error) {
          setErrorMessage('System link error. Synchronization stalled.');
        } finally {
          setIsLoading(false);
        }
      };

      const handleArtistSubmit = async (e) => {
        e.preventDefault();
        if (!formTitle || !formArtist || !attachedAsset) return;

        const payload = {
          title: formTitle,
          artist: formArtist,
          genre: formGenre,
          duration: '3:45'
        };

        try {
          const response = await fetch(`${API_BASE_URL}/releases`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          if (!response.ok) throw new Error('Ingestion pipeline rejected payload.');
          
          setFormTitle('');
          setFormArtist('');
          setAttachedAsset(null);
          await loadCatalogData();
        } catch (error) {
          alert(error.message);
        }
      };

      const handleApprove = async (trackId) => {
        try {
          const response = await fetch(`${API_BASE_URL}/releases/${trackId}/approve`, {
            method: 'PATCH'
          });
          if (!response.ok) throw new Error('Authorization transmission error.');
          setIsPlaying(false);
          await loadCatalogData();
        } catch (error) {
          alert(error.message);
        }
      };

      const handleReject = async (trackId) => {
        if (!rejectionReason.trim()) return;
        try {
          const response = await fetch(`${API_BASE_URL}/releases/${trackId}/reject`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ reason: rejectionReason })
          });
          if (!response.ok) throw new Error('Rejection feedback transmission failed.');
          setRejectionReason('');
          setIsPlaying(false);
          await loadCatalogData();
        } catch (error) {
          alert(error.message);
        }
      };

      const pendingCount = releases.filter(t => t.status === 'Pending').length;
      const approvedCount = releases.filter(t => t.status === 'Approved').length;
      const rejectedCount = releases.filter(t => t.status === 'Rejected').length;

      return (
        <div className="min-h-screen p-6">
          {errorMessage && (
            <div className="max-w-7xl mx-auto mb-6 p-4 bg-slate-900 border-2 border-rose-600 text-rose-500 text-xs font-mono">
              SYSTEM_ALERT: {errorMessage}
            </div>
          )}

          {/* Flat Navigation System */}
          <header className="max-w-7xl mx-auto mb-8 flex flex-col sm:flex-row justify-between items-center p-4 bg-slate-900 border-2 border-slate-800">
            <div className="text-center sm:text-left">
              <span className="text-xl font-bold tracking-widest text-cyan-500 font-mono">VINI</span>
              <span className="text-xs text-slate-500 block font-mono">CORE AUDIO PIPELINE</span>
            </div>
            
            <div className="flex bg-black border border-slate-800 p-1 mt-4 sm:mt-0">
              <button 
                onClick={() => setCurrentView('artist')}
                className={`px-4 py-2 text-xs font-mono transition-colors ${currentView === 'artist' ? 'bg-cyan-600 text-black font-bold' : 'text-slate-400 hover:text-slate-200'}`}
              >
                ARTIST GATEWAY
              </button>
              <button 
                onClick={() => {
                  setCurrentView('admin');
                  const firstPending = releases.find(t => t.status === 'Pending');
                  if (firstPending) setSelectedTrackId(firstPending.id);
                }}
                className={`px-4 py-2 text-xs font-mono transition-colors ${currentView === 'admin' ? 'bg-purple-600 text-white font-bold' : 'text-slate-400 hover:text-slate-200'}`}
              >
                ADMIN WORKSPACE
              </button>
            </div>
          </header>

          {isLoading ? (
            <div className="max-w-7xl mx-auto text-center py-24 bg-slate-900 border-2 border-slate-800">
              <div className="w-8 h-8 border-4 border-slate-700 border-t-cyan-500 mx-auto mb-4"></div>
              <p className="text-xs font-mono text-slate-400">INITIALIZING ENGINES...</p>
            </div>
          ) : (
            <main className="max-w-7xl mx-auto">
              {currentView === 'artist' ? (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                  
                  {/* Flat Form Block */}
                  <div className="bg-slate-900 border-2 border-slate-800 p-6">
                    <h2 className="text-xs font-bold font-mono tracking-wider text-slate-400 uppercase mb-6 border-b-2 border-slate-800 pb-2">
                      SUBMIT DISTRIBUTION PROFILE
                    </h2>
                    <form onSubmit={handleArtistSubmit} className="space-y-4">
                      <div>
                        <label className="block text-[11px] font-mono text-slate-400 uppercase mb-1">Track Title</label>
                        <input 
                          type="text" 
                          value={formTitle}
                          onChange={(e) => setFormTitle(e.target.value)}
                          placeholder="Absolute catalog title"
                          className="w-full bg-black border-2 border-slate-800 px-3 py-2 text-xs text-slate-200 placeholder-slate-700 focus:outline-none focus:border-cyan-500"
                        />
                      </div>
                      <div>
                        <label className="block text-[11px] font-mono text-slate-400 uppercase mb-1">Primary Producer</label>
                        <input 
                          type="text" 
                          value={formArtist}
                          onChange={(e) => setFormArtist(e.target.value)}
                          placeholder="Artist record profile tag"
                          className="w-full bg-black border-2 border-slate-800 px-3 py-2 text-xs text-slate-200 placeholder-slate-700 focus:outline-none focus:border-cyan-500"
                        />
                      </div>
                      <div>
                        <label className="block text-[11px] font-mono text-slate-400 uppercase mb-1">Primary Genre</label>
                        <select 
                          value={formGenre}
                          onChange={(e) => setFormGenre(e.target.value)}
                          className="w-full bg-black border-2 border-slate-800 px-3 py-2 text-xs text-slate-200 focus:outline-none focus:border-cyan-500"
                        >
                          <option value="Electronic / Synthwave">Electronic / Synthwave</option>
                          <option value="IDM / Glitch">IDM / Glitch</option>
                          <option value="Ambient / Drone">Ambient / Drone</option>
                          <option value="Industrial / Techno">Industrial / Techno</option>
                        </select>
                      </div>
                      <div>
                        <label className="block text-[11px] font-mono text-slate-400 uppercase mb-1">Lossless File System Target</label>
                        <div 
                          onClick={() => setAttachedAsset('audio_source_master.wav')}
                          className={`border-2 border-dashed p-4 text-center cursor-pointer transition-colors ${attachedAsset ? 'border-cyan-500 bg-cyan-950/20' : 'border-slate-800 bg-black'}`}
                        >
                          <span className="text-xs font-mono text-slate-400 block">
                            {attachedAsset ? `LOADED: ${attachedAsset}` : 'SELECT SOURCE WAV FILE'}
                          </span>
                        </div>
                      </div>
                      <button 
                        type="submit" 
                        disabled={!formTitle || !formArtist || !attachedAsset}
                        className="w-full bg-cyan-600 disabled:bg-slate-800 disabled:text-slate-600 text-black font-bold font-mono text-xs py-3 tracking-widest uppercase transition-colors"
                      >
                        DISPATCH INTO PIPELINE
                      </button>
                    </form>
                  </div>

                  {/* Flat Table List Block */}
                  <div className="lg:col-span-2 bg-slate-900 border-2 border-slate-800 p-6">
                    <h2 className="text-xs font-bold font-mono tracking-wider text-slate-400 uppercase mb-6 border-b-2 border-slate-800 pb-2">
                      LIVE INGESTION REGISTRY
                    </h2>
                    <div className="overflow-x-auto">
                      <table className="w-full text-left">
                        <thead>
                          <tr className="border-b-2 border-slate-800 text-[10px] font-mono uppercase text-slate-500">
                            <th className="pb-2 font-normal">TRACK ATTRIBUTES</th>
                            <th className="pb-2 font-normal">GENRE SYSTEM</th>
                            <th className="pb-2 font-normal">PIPELINE STATUS</th>
                            <th className="pb-2 font-normal text-right">SYSTEM LOG NOTES</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-800 text-xs font-mono">
                          {releases.length === 0 ? (
                            <tr>
                              <td colSpan="4" className="py-6 text-center text-slate-600">Zero indices mapped.</td>
                            </tr>
                          ) : (
                            releases.map((track) => (
                              <tr key={track.id} className="hover:bg-black/40">
                                <td className="py-3">
                                  <div className="font-bold text-slate-300">{track.title}</div>
                                  <div className="text-[11px] text-slate-500">{track.artist}</div>
                                </td>
                                <td className="py-3 text-slate-400">{track.genre}</td>
                                <td className="py-3">
                                  <span className={`px-2 py-0.5 text-[10px] font-bold border uppercase ${
                                    track.status === 'Approved' ? 'border-emerald-600 bg-emerald-950/30 text-emerald-400' :
                                    track.status === 'Rejected' ? 'border-rose-600 bg-rose-950/30 text-rose-400' :
                                    'border-amber-600 bg-amber-950/30 text-amber-400'
                                  }`}>
                                    {track.status}
                                  </span>
                                </td>
                                <td className="py-3 text-right text-slate-400 max-w-xs truncate">
                                  {track.notes || <span className="text-slate-700">Empty configuration</span>}
                                </td>
                              </tr>
                            ))
                          )}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              ) : (
                /* Flat Admin Panel Workspace Grid */
                <div className="space-y-6">
                  <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div className="bg-slate-900 border-2 border-slate-800 p-4 flex justify-between items-center font-mono">
                      <div>
                        <div className="text-[10px] uppercase text-slate-500">QUEUE TOTALS</div>
                        <div className="text-xl font-bold text-amber-400 mt-1">{pendingCount}</div>
                      </div>
                      <div className="w-3 h-3 bg-amber-500" />
                    </div>
                    <div className="bg-slate-900 border-2 border-slate-800 p-4 flex justify-between items-center font-mono">
                      <div>
                        <div className="text-[10px] uppercase text-slate-500">INGESTION COMPLETE</div>
                        <div className="text-xl font-bold text-emerald-400 mt-1">{approvedCount}</div>
                      </div>
                      <div className="w-3 h-3 bg-emerald-500" />
                    </div>
                    <div className="bg-slate-900 border-2 border-slate-800 p-4 flex justify-between items-center font-mono">
                      <div>
                        <div className="text-[10px] uppercase text-slate-500">DISCARD ARCHIVES</div>
                        <div className="text-xl font-bold text-rose-400 mt-1">{rejectedCount}</div>
                      </div>
                      <div className="w-3 h-3 bg-rose-500" />
                    </div>
                  </div>

                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    {/* Backlog Item Selector */}
                    <div className="bg-slate-900 border-2 border-slate-800 p-4 h-[460px] flex flex-col">
                      <h3 className="text-[11px] font-bold font-mono uppercase text-slate-400 mb-3 border-b border-slate-800 pb-1">INCOMING REGISTRY</h3>
                      <div className="space-y-2 overflow-y-auto flex-1">
                        {releases.filter(t => t.status === 'Pending').length === 0 ? (
                          <div className="text-xs font-mono text-slate-600 p-4 text-center border-2 border-dashed border-slate-800">
                            Backlog verification cleared.
                          </div>
                        ) : (
                          releases.filter(t => t.status === 'Pending').map((track) => (
                            <div 
                              key={track.id}
                              onClick={() => {
                                setSelectedTrackId(track.id);
                                setIsPlaying(false);
                                setPlaybackProgress(0);
                              }}
                              className={`p-3 border font-mono cursor-pointer transition-colors ${selectedTrackId === track.id ? 'bg-slate-800 border-purple-500' : 'bg-black border-slate-800 hover:bg-slate-800/50'}`}
                            >
                              <div className="text-xs font-bold text-slate-200 truncate">{track.title}</div>
                              <div className="text-[11px] text-slate-500 truncate">{track.artist}</div>
                              <div className="flex justify-between items-center mt-2 pt-2 border-t border-slate-800 text-[10px] text-slate-500">
                                <span>{track.genre.split(' / ')[0]}</span>
                                <span>{track.date}</span>
                              </div>
                            </div>
                          ))
                        )}
                      </div>
                    </div>

                    {/* Operational Workspace View */}
                    <div className="lg:col-span-2 bg-slate-900 border-2 border-slate-800 p-6 flex flex-col justify-between min-h-[460px]">
                      {selectedTrack && selectedTrack.status === 'Pending' ? (
                        <>
                          <div className="font-mono">
                            <div className="flex justify-between items-start mb-4 border-b border-slate-800 pb-3">
                              <div>
                                <span className="text-[10px] text-purple-400 border border-purple-800 bg-purple-950/20 px-2 py-0.5 uppercase tracking-wider">
                                  CORE ASSET INSPECTION
                                </span>
                                <h2 className="text-lg font-bold text-slate-200 mt-2">{selectedTrack.title}</h2>
                                <p className="text-xs text-slate-500">Uploader profile: {selectedTrack.artist}</p>
                              </div>
                              <div className="text-right text-[11px] text-slate-600">
                                <div>TRACK_ID: {selectedTrack.id}</div>
                                <div>ENCODING: 24bit WAV</div>
                              </div>
                            </div>

                            <div className="grid grid-cols-2 gap-2 text-xs text-slate-400 mb-4 bg-black p-3 border border-slate-800">
                              <div className="flex items-center space-x-2">
                                <span className="w-2 h-2 bg-cyan-600" />
                                <span>DDEX Structure Clear</span>
                              </div>
                              <div className="flex items-center space-x-2">
                                <span className="w-2 h-2 bg-cyan-600" />
                                <span>Fingerprinting Clean</span>
                              </div>
                            </div>

                            {/* Flat Media Simulation Strip */}
                            <div className="bg-black border border-slate-800 p-4">
                              <div className="flex items-center space-x-4 mb-3">
                                <button 
                                  onClick={() => setIsPlaying(!isPlaying)}
                                  className="bg-slate-200 text-black font-bold font-mono text-[10px] px-4 py-2 hover:bg-white transition-colors"
                                >
                                  {isPlaying ? 'HALT' : 'MONITOR TRACK'}
                                </button>
                                <div className="flex-1 min-w-0">
                                  <div className="text-xs font-bold text-slate-400 truncate">{selectedTrack.title}</div>
                                  <div className="text-[10px] text-slate-600">128kbps Encrypted Source</div>
                                </div>
                              </div>
                              
                              {/* Simple Bar Interface Tracker */}
                              <div className="w-full h-4 bg-slate-950 border border-slate-800 relative">
                                <div 
                                  style={{ width: `${playbackProgress}%` }}
                                  className="h-full bg-purple-600 transition-all duration-300"
                                />
                              </div>
                            </div>
                          </div>

                          <div className="border-t border-slate-800 pt-4 space-y-3 font-mono">
                            <button
                              onClick={() => handleApprove(selectedTrack.id)}
                              className="w-full bg-emerald-600 text-black font-bold text-xs py-3 tracking-widest uppercase hover:bg-emerald-500 transition-colors"
                            >
                              COMMIT DIRECTLY TO DISTRIBUTION ROUTE
                            </button>
                            <div className="flex gap-2">
                              <input 
                                type="text"
                                value={rejectionReason}
                                onChange={(e) => setRejectionReason(e.target.value)}
                                placeholder="State core structural defect logs..."
                                className="flex-1 bg-black border-2 border-slate-800 px-3 py-2 text-xs text-slate-200 focus:outline-none focus:border-rose-600"
                              />
                              <button
                                onClick={() => handleReject(selectedTrack.id)}
                                disabled={!rejectionReason.trim()}
                                className="bg-rose-950/40 hover:bg-rose-900/40 border border-rose-600 text-rose-500 disabled:opacity-20 text-[11px] font-bold px-4 uppercase transition-colors"
                              >
                                EXECUTE DISCARD
                              </button>
                            </div>
                          </div>
                        </>
                      ) : (
                        <div className="m-auto text-center font-mono py-12">
                          <div className="text-slate-600 text-xs">NO QUEUE FOCUS SELECTION TARGETED</div>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              )}
            </main>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ViniDashboard />);
  </script>
</body>
</html>
